# Data Sources Configuration

# Domestic sources (China)
domestic:
  websites:
    - name: "机器之心"
      url: "https://www.jiqizhixin.com"
      category: "AI"
      scrape_selector: ".article-content"
    - name: "量子位"
      url: "https://www.qbitai.com"
      category: "AI"
      scrape_selector: ".article-body"
    - name: "AI 科技评论"
      url: "https://aitechtalk.com"
      category: "AI"
      scrape_selector: ".article-content"

  rss_feeds:
    - name: "机器之心 RSS"
      url: "https://www.jiqizhixin.com/rss"
      category: "AI"
      priority: high
    - name: "量子位 RSS"
      url: "https://www.qbitai.com/feed"
      category: "AI"
      priority: high
    - name: "机器之心论文"
      url: "https://www.jiqizhixin.com/paper/rss"
      category: "AI"
      priority: medium

# International sources
international:
  websites:
    - name: "Hacker News AI"
      url: "https://news.ycombinator.com/front?query=AI"
      category: "AI"
      scrape_selector: ".athing"
    - name: "arXiv cs.AI"
      url: "https://arxiv.org/list/cs.AI/recent"
      category: "AI"
      scrape_selector: ".list-content"
    - name: "Towards Data Science"
      url: "https://towardsdatascience.com"
      category: "AI"
      scrape_selector: "article"

  rss_feeds:
    - name: "Hacker News"
      url: "https://news.ycombinator.com/rss"
      category: "AI"
      priority: medium
    - name: "arXiv cs.AI"
      url: "https://arxiv.org/rss/cs.AI"
      category: "AI"
      priority: high
    - name: "arXiv cs.LG"
      url: "https://arxiv.org/rss/cs.LG"
      category: "AI"
      priority: high
    - name: "arXiv cs.CL"
      url: "https://arxiv.org/rss/cs.CL"
      category: "AI"
      priority: medium
    - name: "Sebastian Raschka"
      url: "https://sebastianraschka.com/rss.xml"
      category: "AI"
      priority: high
    - name: "Jay Alammar"
      url: "https://jalammar.github.io/feed.xml"
      category: "AI"
      priority: high

  video_channels:
    - name: "YouTube AI Channels"
      platform: "youtube"
      category: "AI"

# User custom sources (add your own here)
custom:
  websites: []
  rss_feeds: []
