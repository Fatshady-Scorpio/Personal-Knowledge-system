# Scheduler settings

# Daily collection job - runs every morning
daily_collection:
  enabled: true
  hour: 9
  minute: 0
  timezone: Asia/Shanghai

# Optional: Frequent RSS check (every 2 hours during work hours)
rss_check:
  enabled: false  # Set to true for more frequent updates
  hour: "*/2"     # Every 2 hours
  minute: 0
  start_hour: 8   # Start at 8am
  end_hour: 20    # End at 8pm

# Video content check - runs nightly
video_check:
  enabled: false  # Phase 2 feature
  hour: 22
  minute: 0
